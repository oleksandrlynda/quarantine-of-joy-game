name: Asset Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-assets:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Build generated GLBs
        run: npm run assets:build
      - name: Verify generated package
        run: npm run assets:verify
      - name: Upload generated asset artifact
        uses: actions/upload-artifact@v4
        with:
          name: generated-assets
          path: assets/generated/
          if-no-files-found: error
          retention-days: 7
